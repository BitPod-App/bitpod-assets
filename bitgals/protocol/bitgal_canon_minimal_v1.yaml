version: 1
project: bitgals

review_policy:
  official_pass:
    min_total: 90
    min_base_identity: 92
    min_persona: 90
    max_confusion: 10
  conditional_review:
    min_total: 85
    min_base_identity: 88
    min_persona: 85
  auto_fail:
    max_total: 84
  hard_fail:
    - wrong_persona_read
    - not_same_base_woman
    - missing_required_anchor
    - generic_ai_portrait

asset_types:
  avatar:
    allowed_extensions: [png, jpg, jpeg, webp]
    preferred_aspect_ratio: "1:1"
    preferred_sizes: [1024, 2048]
  image:
    allowed_extensions: [png, jpg, jpeg, webp]
  video:
    allowed_extensions: [mp4, mov, webm]

folders:
  root: bitgals
  legacy_root: assets/bitgals
  protocol: bitgals/protocol
  shared_base: bitgals/shared_base
  personas:
    taylor: bitgals/taylor
    ember: bitgals/ember
    kate: bitgals/kate
    shiva: bitgals/shiva
    vera: bitgals/vera
  legacy_personas:
    kati: bitgals/kati
  subfolders: [refs, approved, conditional, rejected, avatars, videos, metadata]

naming:
  asset_pattern: "{persona}_{type}_{scene}_{look}_vNN.{ext}"
  metadata_pattern: "{same_filename}.json"

scoring:
  weights:
    base_identity: 30
    persona_visual: 25
    persona_behavior: 15
    scene_fit: 15
    composition: 10
    penalties: 5

personas:
  taylor:
    role: chief_of_staff
    dominant_signal: symmetry
    required:
      - cobalt_blue_hair
      - grey_blue_eyes
      - minimal_makeup
      - sleek_hair
      - single_ear_headset
      - black_suit
      - hq_or_white_futuristic_scene
    forbidden:
      - large_headphones
      - heavy_makeup
      - messy_hair
      - nightclub_scene
      - loud_jewelry
  ember:
    role: performer_creator
    dominant_signal: motion
    required:
      - orange_hair
      - brown_eyes
      - large_headphones
      - black_orange_styling
      - music_or_stage_scene
      - expressive_energy
    forbidden:
      - sterile_hq_scene
      - flat_expression
      - minimal_audio_gear
  kate:
    role: infrastructure_systems_lead
    dominant_signal: technical_motion
    required:
      - electric_yellow_or_pale_yellow_hair
      - bright_blue_eyes
      - white_technical_clothing
      - utility_belt_or_high_end_gadgets
      - microchip_or_electrical_wire_tools
      - watch_comms_or_node_infrastructure_cue
      - office_lab_or_infrastructure_scene
    preferred:
      - barefoot_or_health_obsessed_cue
      - fitness_or_biological_data_cue
      - signal_routing_or_repair_context
      - layer_2_or_node_operations_cue
    forbidden:
      - generic_cyberpunk_hacker_girl
      - messy_mechanic_stereotype
      - sound_engineer_only
      - dj_girl_identity_collapse
  shiva:
    role: core_security_architect
    dominant_signal: lighting
    required:
      - indian_descent
      - dark_brown_hair_with_purple_or_violet_strands
      - short_bob_cut
      - orange_forehead_dot_or_third_eye_mark
      - amber_eyes
      - cinematic_darkness
      - massive_office_or_underground_security_implication
    forbidden:
      - generic_goth_cyber_girl
      - villain_read
      - decorative_exoticism
      - large_headphones
  vera:
    role: verification_systems_lead
    dominant_signal: structure
    required:
      - short_pale_green_or_practical_brunette_hair
      - light_green_or_grey_green_eyes
      - glasses
      - practical_dark_executive_tech_clothing
      - terminal_server_or_qa_war_room_scene
      - logs_diffs_failed_tests_or_dashboard_cue
    forbidden:
      - nightclub_scene
      - flashy_jewelry
      - heavy_makeup
      - influencer_pose
      - passive_compliance_person_read

legacy_aliases:
  kati:
    canonical_persona: kate
    status: legacy_v1_alias
    note: "Do not use for new v2 intake. Intake should normalize to kate."
