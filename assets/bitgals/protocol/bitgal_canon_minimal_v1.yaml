version: 1
project: bitgals

review_policy:
  official_pass:
    min_total: 90
    min_base_identity: 92
    min_persona: 90
    max_confusion: 10
  conditional_review:
    min_total: 85
    min_base_identity: 88
    min_persona: 85
  auto_fail:
    max_total: 84
  hard_fail:
    - wrong_persona_read
    - not_same_base_woman
    - missing_required_anchor
    - generic_ai_portrait

asset_types:
  avatar:
    allowed_extensions: [png, jpg, jpeg, webp]
    preferred_aspect_ratio: "1:1"
    preferred_sizes: [1024, 2048]
  image:
    allowed_extensions: [png, jpg, jpeg, webp]
  video:
    allowed_extensions: [mp4, mov, webm]

folders:
  root: assets/bitgals
  protocol: assets/bitgals/protocol
  shared_base: assets/bitgals/shared_base
  personas:
    taylor: assets/bitgals/taylor
    orange: assets/bitgals/orange
    kati: assets/bitgals/kati
    shiva: assets/bitgals/shiva
    vera: assets/bitgals/vera
  subfolders: [refs, approved, conditional, rejected, avatars, videos, metadata]

naming:
  asset_pattern: "{persona}_{type}_{scene}_{look}_vNN.{ext}"
  metadata_pattern: "{same_filename}.json"

scoring:
  weights:
    base_identity: 30
    persona_visual: 25
    persona_behavior: 15
    scene_fit: 15
    composition: 10
    penalties: 5

personas:
  taylor:
    role: chief_of_staff
    dominant_signal: symmetry
    required:
      - cobalt_blue_hair
      - grey_blue_eyes
      - minimal_makeup
      - sleek_hair
      - single_ear_headset
      - black_suit
      - hq_or_white_futuristic_scene
    forbidden:
      - large_headphones
      - heavy_makeup
      - messy_hair
      - nightclub_scene
      - loud_jewelry
  orange:
    role: performer_creator
    dominant_signal: motion
    required:
      - orange_hair
      - brown_eyes
      - large_headphones
      - black_orange_styling
      - music_or_stage_scene
      - expressive_energy
    forbidden:
      - sterile_hq_scene
      - flat_expression
      - minimal_audio_gear
  kati:
    role: sound_engineer_dj_repair
    dominant_signal: texture
    required:
      - pale_green_turquoise_hair
      - purple_eyes
      - heavy_makeup
      - gold_jewelry
      - dark_brows
      - studio_or_backstage_or_repair_scene
    preferred:
      - blockchain_neck_tattoo
      - black_purple_leather
      - bitcoin_jewelry
      - tools_or_wires
    forbidden:
      - minimalist_clean_look
      - no_jewelry
      - corporate_office_scene
  shiva:
    role: dark_narrator
    dominant_signal: lighting
    required:
      - short_purple_hair
      - darker_skin_presentation
      - black_eyes
      - hot_pink_lipstick
      - silver_accessories
      - glossy_black_suit
      - cinematic_night_scene
    forbidden:
      - gold_jewelry
      - repair_tools
      - executive_hq_symmetry
      - large_headphones
  vera:
    role: qa_engineer
    dominant_signal: structure
    required:
      - brunette_hair
      - light_green_eyes
      - glasses
      - executive_tech_clothing
      - office_or_server_or_terminal_scene
    forbidden:
      - nightclub_scene
      - flashy_jewelry
      - heavy_makeup
      - influencer_pose
